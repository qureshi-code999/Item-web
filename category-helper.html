<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Category Helper - Sahil Traders</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header { background: #111; border-bottom: 2px solid #d4af37; padding: 10px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; flex-wrap: wrap; }
  header h1 { color: #d4af37; font-size: 15px; font-weight: 700; flex: 1; }
  .header-btns { display: flex; gap: 8px; align-items: center; }
  .btn { padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 600; border: none; cursor: pointer; transition: all 0.15s; }
  .btn-gold { background: #d4af37; color: #000; }
  .btn-gold:hover { background: #e8c84a; }
  .btn-red { background: #5a1a1a; color: #ff6b6b; border: 1px solid #ff3333; }
  .btn-red:hover { background: #6a2a2a; }
  .btn-green { background: #1a4a1a; color: #5aba5a; border: 1px solid #3a8a3a; }
  .btn-green:hover { background: #2a5a2a; }
  .saved-label { font-size: 10px; color: #5aba5a; }

  .layout { display: flex; flex: 1; overflow: hidden; }

  /* LEFT: Items */
  .items-panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #222; min-width: 0; }
  .panel-head { padding: 8px 12px; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #d4af37; background: #111; border-bottom: 1px solid #1e1e1e; flex-shrink: 0; display: flex; align-items: center; gap: 8px; }
  .search-bar { padding: 6px 10px; background: #0d0d12; border-bottom: 1px solid #1a1a22; flex-shrink: 0; display: flex; gap: 6px; }
  .search-bar input { flex: 1; background: #1a1a22; border: 1px solid #2a2a36; border-radius: 5px; padding: 5px 9px; color: #fff; font-size: 12px; outline: none; }
  .search-bar input:focus { border-color: #d4af37; }
  .filter-btn { padding: 4px 9px; border-radius: 5px; font-size: 11px; border: 1px solid #2a2a36; background: #1a1a22; color: #aaa; cursor: pointer; }
  .filter-btn.active { border-color: #d4af37; color: #d4af37; background: #1a1a10; }

  .items-list { overflow-y: auto; flex: 1; }
  .item-row { display: flex; align-items: center; padding: 6px 12px; border-bottom: 1px solid #111; font-size: 12px; gap: 8px; cursor: pointer; transition: background 0.1s; }
  .item-row:hover { background: #14141c; }
  .item-row.selected { background: #1a200d !important; border-left: 3px solid #d4af37; }
  .item-row.assigned { background: #0b180b; }
  .item-row .num { color: #444; font-size: 10px; min-width: 26px; text-align: right; }
  .item-row .name { flex: 1; color: #ddd; line-height: 1.3; }
  .item-row .cat-badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; background: #1a3a1a; color: #6aca6a; white-space: nowrap; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
  .item-row .undo-x { color: #555; font-size: 12px; cursor: pointer; padding: 0 3px; }
  .item-row .undo-x:hover { color: #ff6b6b; }

  /* RIGHT: Categories */
  .cats-panel { width: 200px; flex-shrink: 0; display: flex; flex-direction: column; background: #0d0d12; border-right: 1px solid #1a1a22; }
  .cats-list { overflow-y: auto; flex: 1; padding: 4px 0; }
  .cat-item { padding: 8px 12px; font-size: 12px; color: #bbb; cursor: pointer; border-left: 3px solid transparent; display: flex; justify-content: space-between; align-items: center; transition: all 0.1s; }
  .cat-item:hover { background: #14141c; color: #d4af37; border-left-color: #d4af37; }
  .cat-count { font-size: 10px; background: #1a3a1a; color: #5aba5a; padding: 1px 6px; border-radius: 8px; }

  /* BOTTOM */
  .bottom-bar { background: #0d0d12; border-top: 1px solid #1a1a22; padding: 7px 14px; font-size: 11px; color: #666; display: flex; gap: 16px; align-items: center; flex-shrink: 0; }
  .bottom-bar strong { color: #d4af37; }
  .progress-bar { flex: 1; height: 4px; background: #1a1a22; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #d4af37, #5aba5a); transition: width 0.3s; border-radius: 2px; }

  /* Toast */
  #toast { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); background: #1a3a1a; color: #5aba5a; border: 1px solid #3a6a3a; padding: 8px 18px; border-radius: 20px; font-size: 12px; font-weight: 600; pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 999; }
  #toast.show { opacity: 1; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #111; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
</style>

// ── State ─────────────────────────────────────────────────────────
let assignments = JSON.parse(localStorage.getItem('st_assignments') || '{}');
let selectedItem = null;
let showUnassignedOnly = false;
let filteredItems = [...ITEMS];

// ── Save ──────────────────────────────────────────────────────────
function save() {
  localStorage.setItem('st_assignments', JSON.stringify(assignments));
  showToast('💾 Saved!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

// ── Render Items ──────────────────────────────────────────────────
function renderItems() {
  const list = document.getElementById('itemsList');
  let items = filteredItems;
  if (showUnassignedOnly) items = items.filter(i => !assignments[i.id]);
  document.getElementById('hd-count').textContent = `(${items.length} showing)`;

  list.innerHTML = items.map(item => {
    const catId = assignments[item.id];
    const catName = catId ? CATEGORIES.find(c => c.id === catId)?.name : '';
    const isSel = selectedItem === item.id;
    return `<div class="item-row ${catId ? 'assigned' : ''} ${isSel ? 'selected' : ''}"
      id="item-${item.id}" onclick="selectItem(${item.id})">
      <span class="num">${item.id}</span>
      <span class="name">${item.name}</span>
      ${catName
        ? `<span class="cat-badge" title="${catName}">${catName}</span>
           <span class="undo-x" onclick="undoItem(event,${item.id})" title="Undo">✕</span>`
        : ''}
    </div>`;
  }).join('');

  // Scroll selected into view
  if (selectedItem) {
    const el = document.getElementById(`item-${selectedItem}`);
    if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

// ── Render Categories ─────────────────────────────────────────────
function renderCats() {
  const list = document.getElementById('catsList');
  list.innerHTML = CATEGORIES.map(cat => {
    const count = Object.values(assignments).filter(v => v === cat.id).length;
    return `<div class="cat-item" onclick="assignCategory('${cat.id}')">
      <span>${cat.name}</span>
      ${count > 0 ? `<span class="cat-count">${count}</span>` : ''}
    </div>`;
  }).join('');
}

// ── Select Item ───────────────────────────────────────────────────
function selectItem(id) {
  selectedItem = id;
  const item = ITEMS.find(i => i.id === id);
  document.getElementById('selected-label').textContent = item ? `▶ ${item.name}` : '';
  renderItems();
}

// ── Assign Category ───────────────────────────────────────────────
function assignCategory(catId) {
  if (!selectedItem) {
    showToast('⚠️ Pehle item click karein');
    return;
  }
  assignments[selectedItem] = catId;
  save();

  // Auto advance to next unassigned
  const visibleItems = showUnassignedOnly
    ? filteredItems.filter(i => !assignments[i.id] || i.id === selectedItem)
    : filteredItems;
  const currentIndex = visibleItems.findIndex(i => i.id === selectedItem);
  const next = visibleItems.slice(currentIndex + 1).find(i => !assignments[i.id]);
  selectedItem = next ? next.id : null;
  document.getElementById('selected-label').textContent = next ? `▶ ${next.name}` : '✅ All done!';

  updateProgress();
  renderItems();
  renderCats();
}

// ── Undo single item ──────────────────────────────────────────────
function undoItem(e, id) {
  e.stopPropagation();
  delete assignments[id];
  save();
  updateProgress();
  renderItems();
  renderCats();
}

// ── Filter ────────────────────────────────────────────────────────
function filterItems() {
  const q = document.getElementById('search').value.toLowerCase();
  filteredItems = ITEMS.filter(i => i.name.toLowerCase().includes(q));
  renderItems();
}

function toggleFilter() {
  showUnassignedOnly = !showUnassignedOnly;
  document.getElementById('filterUnassigned').classList.toggle('active', showUnassignedOnly);
  renderItems();
}

// ── Progress ──────────────────────────────────────────────────────
function updateProgress() {
  const total = ITEMS.length;
  const done = Object.keys(assignments).length;
  document.getElementById('assigned-count').textContent = done;
  document.getElementById('remaining-count').textContent = total - done;
  document.getElementById('progressFill').style.width = `${Math.round(done / total * 100)}%`;
}

// ── Clear All ─────────────────────────────────────────────────────
function clearAll() {
  if (!confirm('Sab assignments reset karna chahte hain?')) return;
  assignments = {};
  selectedItem = null;
  save();
  updateProgress();
  renderItems();
  renderCats();
}

// ── Export JSON ───────────────────────────────────────────────────
function exportJSON() {
  const data = JSON.stringify(assignments, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'category-assignments.json';
  a.click();
  showToast('📥 JSON downloaded!');
}

// ── Apply to Website ──────────────────────────────────────────────
function applyToWebsite() {
  const done = Object.keys(assignments).length;
  if (done === 0) { showToast('⚠️ Koi assignment nahi hai abhi'); return; }

  const lines = Object.entries(assignments).map(([id, catId]) => {
    const item = ITEMS.find(i => i.id == id);
    const cat = CATEGORIES.find(c => c.id === catId);
    return `${id}|${catId}|${cat?.name || ''}`;
  }).join('\n');

  const blob = new Blob([lines], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'assignments-for-website.txt';
  a.click();
  showToast(`✅ ${done} assignments exported! Ab website update hogi.`);
}

// ── Init ──────────────────────────────────────────────────────────
updateProgress();
renderItems();
renderCats();
</script>
