    body {

    .splash-grid {

                        linear-gradient(to bottom, rgba(212, 175, 55, 0.015) 1px, transparent 1px);
    }
    
    /* Luxury Keyframe Animations */
    @keyframes customSlowSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes customScalePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
    @keyframes customScalePulseSlow {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    
    /* Horizontal Laser Line Draw */
    @keyframes laser-draw {
      0% { width: 0%; opacity: 0; }
      15% { opacity: 1; }
      50% { width: 100%; opacity: 1; box-shadow: 0 0 10px #f59e0b, 0 0 20px #d4af37; }
      80% { width: 100%; opacity: 0.8; height: 1px; }
      100% { width: 100%; opacity: 0; height: 0px; }

    /* Portal Glow split */
    @keyframes portal-glow-reveal {
      0% { transform: scale(0.6); opacity: 0; filter: blur(40px); }
      40% { transform: scale(1.1); opacity: 0.8; filter: blur(25px); }
      70% { transform: scale(1); opacity: 0.6; filter: blur(15px); }
      100% { transform: scale(1); opacity: 0.4; filter: blur(20px); }

      100% { transform: scale(1) rotate(0deg); opacity: 1; filter: brightness(1) blur(0); }
    }

    /* Laser Text Carving Mask */
    @keyframes text-laser-reveal {
      0% { clip-path: inset(0 100% 0 0); }
      100% { clip-path: inset(0 0 0 0); }
    }

    /* Metallic Gold Shimmer Sweep */
    @keyframes gold-shimmer-sweep {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    /* Slow Drift animations for floating vectors */
    @keyframes float-drift-1 {
      0% { transform: translate(0, 0) rotate(0deg) scale(0.8); }
      33% { transform: translate(30px, -45px) rotate(15deg) scale(0.85); }
      66% { transform: translate(-20px, 20px) rotate(-15deg) scale(0.75); }
      100% { transform: translate(0, 0) rotate(0deg) scale(0.8); }
    }

      0% { transform: translate(0, 0) rotate(0deg) scale(0.7); }

      50% { transform: translate(25px, -25px) rotate(10deg) scale(0.75); }
      75% { transform: translate(-10px, -40px) rotate(-10deg) scale(0.7); }
      100% { transform: translate(0, 0) rotate(0deg) scale(0.7); }
    }
    @keyframes float-drift-3 {
      0% { transform: translate(0, 0) rotate(0deg) scale(0.9); }
      50% { transform: translate(50px, 50px) rotate(20deg) scale(0.95); }
      100% { transform: translate(0, 0) rotate(0deg) scale(0.9); }
    }
    @keyframes float-drift-4 {
      0% { transform: translate(0, 0) rotate(0deg) scale(0.6); }
      30% { transform: translate(-30px, -30px) rotate(-15deg) scale(0.55); }
      70% { transform: translate(35px, -15px) rotate(25deg) scale(0.65); }
      100% { transform: translate(0, 0) rotate(0deg) scale(0.6); }

    const PAGE_SIZE = 10;

      const products = PRODUCTS;

      const [catMenuOpen, setCatMenuOpen] = useState(false);
      const [suggestOpen, setSuggestOpen] = useState(false);
      const [recentSearches, setRecentSearches] = useState([]); // in-memory only, resets on reload
      const searchBoxRef = useRef(null);
      const langData = useMemo(() => {
        return window.TRANSLATIONS?.[language] || window.TRANSLATIONS?.en || {};
      }, [language]);

      // Memoized 18 random floating product silhouettes (raw line-art vector outlines)
      const floatingSilhouettes = useMemo(() => {
        const types = [ShampooIcon, SoapIcon, FaceWashIcon, CreamIcon, RazorIcon, PerfumeIcon];
        return Array.from({ length: 18 }).map((_, idx) => {
          const Icon = types[idx % types.length];
          const left = Math.random() * 90 + 5; // 5% to 95%
          const top = Math.random() * 90 + 5;  // 5% to 95%
          const scale = 0.4 + Math.random() * 0.7; // size variety
          const opacity = 0.05 + Math.random() * 0.07; // very faint, barely visible (0.05–0.12)
          const duration = 20 + Math.random() * 25; // 20s to 45s
          const delay = -Math.random() * 25;
          const animType = Math.floor(Math.random() * 4) + 1; // float-drift-1 to 4
          return {
            id: idx,
            Icon,
            left,
            top,
            scale,
            opacity,
            duration,
            delay,
            animType,
          };
        });
      }, []);

      useEffect(() => {
        const fadeTimer = setTimeout(() => {
          setFadeSplash(true);
        }, 2000); // Start fade-out at 2.0 seconds

        const removeTimer = setTimeout(() => {
          setShowSplash(false);
        }, 3000); // Completely remove splash screen at 3.0 seconds

        return () => {
          clearTimeout(fadeTimer);
          clearTimeout(removeTimer);
        };
      }, []);

      useEffect(() => {
        setVisibleCount(PAGE_SIZE);
      }, [searchTerm, activeCategory]);

      useEffect(() => {
        function handleClickOutside(e) {
          if (searchBoxRef.current && !searchBoxRef.current.contains(e.target)) {
            setSuggestOpen(false);
          }
        }
        document.addEventListener("mousedown", handleClickOutside);
        return () => document.removeEventListener("mousedown", handleClickOutside);
      }, []);

      const filtered = useMemo(() => {
        const term = searchTerm.trim().toLowerCase();
        return products.filter((p) => {
          const matchesCategory = activeCategory === "all" || p.categoryId === activeCategory;
          const matchesSearch = term === "" || p.name.toLowerCase().includes(term);
          return matchesCategory && matchesSearch;
        });
      }, [products, activeCategory, searchTerm]);

      const suggestions = useMemo(() => {
        const term = searchTerm.trim().toLowerCase();
        if (term === "") return [];
        return products.filter((p) => p.name.toLowerCase().includes(term)).slice(0, 6);
      }, [products, searchTerm]);

      function recordSearch(product) {
        if (!product) return;
        setRecentSearches((prev) => {
          const withoutDup = prev.filter((p) => p.id !== product.id);
          return [product, ...withoutDup].slice(0, RECENT_LIMIT);
        });
      }

      function handleSuggestionClick(product) {
        setSearchTerm(product.name);
        setSuggestOpen(false);
        recordSearch(product);
      }

      function handleSearchKeyDown(e) {
        if (e.key === "Enter" && suggestions.length > 0) {
          recordSearch(suggestions[0]);
          setSuggestOpen(false);
        }
      }

                    </h1>
                    <p className="text-amber-500/50 text-[10px] sm:text-[11px] font-semibold tracking-[0.25em] uppercase">
                      {translate(langData, "productsInStock", { count: products.length.toLocaleString() })}
                    </p>
                  </div>
                </div>

                {/* Category button — desktop */}
                <div className="hidden sm:block relative">
                  <button
                    onClick={() => setCatMenuOpen((o) => !o)}
                    className="flex items-center gap-2 border px-4 py-2.5 rounded-xl text-sm font-semibold tracking-wide transition-all"
                    style={{ background: 'rgba(9,9,13,0.8)', borderColor: 'rgba(212,175,55,0.18)', color: 'rgba(212,175,55,0.85)' }}
                    onMouseEnter={e => e.currentTarget.style.borderColor='rgba(212,175,55,0.45)'}
                    onMouseLeave={e => e.currentTarget.style.borderColor='rgba(212,175,55,0.18)'}
                  >
                    {activeCategoryName}
                    <ChevronDown className={`w-4 h-4 transition-transform ${catMenuOpen ? "rotate-180" : ""}`} />
                  </button>
                  {catMenuOpen && (
                    <CategoryDropdown
                      activeCategory={activeCategory}
                      setActiveCategory={setActiveCategory}
                      setCatMenuOpen={setCatMenuOpen}
                      langData={langData}
                    />
                  )}
                </div>
              </div>

              {/* Search — Gold Glow */}
              <div className="mt-3 relative" ref={searchBoxRef}>
                <div className="relative">
                  <Search className="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-amber-500/50" />
                  <input
                    type="text"
                    value={searchTerm}
                    onChange={(e) => {
                      setSearchTerm(e.target.value);
                      setSuggestOpen(true);
                    }}
                    onKeyDown={handleSearchKeyDown}
                    placeholder={translate(langData, "searchPlaceholder")}
                    className="w-full border rounded-xl pl-10 pr-9 py-2.5 text-sm transition-all focus:outline-none"
                    style={{ background: 'rgba(9,9,13,0.9)', borderColor: 'rgba(212,175,55,0.15)', color: 'rgba(255,255,255,0.9)', caretColor: '#d4af37' }}
                    onFocus={e => { setSuggestOpen(true); e.target.style.borderColor='rgba(212,175,55,0.5)'; e.target.style.boxShadow='0 0 0 3px rgba(212,175,55,0.08)'; }}
                    onBlur={e => { e.target.style.borderColor='rgba(212,175,55,0.15)'; e.target.style.boxShadow='none'; }}
                  />
                  {searchTerm && (
                    <button
                      onClick={() => setSearchTerm("")}
                      className="absolute right-3 top-1/2 -translate-y-1/2 text-amber-500/40 hover:text-amber-400 transition-colors"
                    >
                      <X className="w-4 h-4" />
                    </button>
                  )}
                </div>

                {suggestOpen && searchTerm && (
                  <div className="absolute mt-2 w-full backdrop-blur-xl rounded-xl shadow-2xl overflow-hidden z-40 border" style={{ background: 'rgba(9,9,13,0.97)', borderColor: 'rgba(212,175,55,0.15)' }}>
                    {suggestions.length > 0 ? (
                      suggestions.map((s) => (
                        <button
                          key={s.id}
                          onClick={() => handleSuggestionClick(s)}
                          className="w-full flex items-center justify-between text-left px-4 py-2.5 text-sm border-b transition-colors"
                          style={{ borderColor: 'rgba(212,175,55,0.07)', color: 'rgba(255,255,255,0.85)' }}
                          onMouseEnter={e => e.currentTarget.style.background='rgba(212,175,55,0.07)'}
                          onMouseLeave={e => e.currentTarget.style.background='transparent'}
                        >
                          <span>{getProductDisplayName(s, language)}</span>
                          <span className="font-bold whitespace-nowrap ml-3" style={{ color: '#d4af37' }}>{translate(langData, 'priceLabel', { amount: s.price.toLocaleString() })}</span>
                        </button>
                      ))
                    ) : (
                      <p className="px-4 py-3 text-sm" style={{ color: 'rgba(255,255,255,0.3)' }}>{translate(langData, "noMatch")}</p>
                    )}
                  </div>
                )}
              </div>

              <div className="mt-3 flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between">
                <div className="text-[10px] font-semibold uppercase tracking-[0.3em]" style={{ color: 'rgba(212,175,55,0.55)' }}>
                  {translate(langData, "languageLabel")}
                </div>
                <select
                  value={language}
                  onChange={(e) => setLanguage(e.target.value)}
                  className="border rounded-xl px-3 py-2 text-sm font-medium transition-all"
                  style={{ background: 'rgba(9,9,13,0.9)', borderColor: 'rgba(212,175,55,0.15)', color: 'rgba(255,255,255,0.9)' }}
                >
                  <option value="en">English</option>
                  <option value="ur">اردو</option>
                </select>
              </div>

              {/* Category button — mobile */}
              <div className="sm:hidden mt-2 relative">
                <button
                  onClick={() => setCatMenuOpen((o) => !o)}
                  className="w-full flex items-center justify-between border px-4 py-2.5 rounded-xl text-sm font-semibold tracking-wide transition-all"
                  style={{ background: 'rgba(9,9,13,0.8)', borderColor: 'rgba(212,175,55,0.18)', color: 'rgba(212,175,55,0.85)' }}
                >
                  {activeCategoryName}
                  <ChevronDown className={`w-4 h-4 transition-transform ${catMenuOpen ? "rotate-180" : ""}`} />
                </button>
                {catMenuOpen && (
                  <CategoryDropdown
                    activeCategory={activeCategory}
                    setActiveCategory={setActiveCategory}
                    setCatMenuOpen={setCatMenuOpen}
                    fullWidth
                    langData={langData}
                  />
                )}
              </div>
            </div>
          </header>

          {/* Body */}
          <main className="max-w-6xl mx-auto px-4 py-5">
            {showRecent && (
              <section className="mb-7">
                <div className="flex items-center gap-2 mb-3">
                  <Clock className="w-4 h-4 text-amber-500/70" />
                  <h2 className="text-sm font-semibold tracking-widest uppercase" style={{ color: 'rgba(212,175,55,0.7)' }}>{translate(langData, "recentSearches")}</h2>
                </div>
                <div className="flex gap-3 overflow-x-auto pb-2 -mx-4 px-4 sm:mx-0 sm:px-0" style={{ scrollbarWidth: "thin" }}>
                  {recentSearches.map((p) => (
                    <button
                      key={`recent-${p.id}`}
                      onClick={() => recordSearch(p)}
                      className="shrink-0 w-32 sm:w-36 rounded-xl overflow-hidden transition-all text-left border"
                      style={{ background: 'rgba(9,9,13,0.9)', borderColor: 'rgba(212,175,55,0.15)' }}
                      onMouseEnter={e => e.currentTarget.style.borderColor='rgba(212,175,55,0.4)'}
                      onMouseLeave={e => e.currentTarget.style.borderColor='rgba(212,175,55,0.15)'}
                    >
                      <div className="h-24 w-full flex items-center justify-center p-2">
                        {p.hasImage ? (
                          <div className={`w-16 h-16 rounded-lg bg-gradient-to-br ${p.gradient} flex items-center justify-center shrink-0`}>
                            <span className="text-white text-sm font-bold" style={{ fontFamily: "'Poppins', sans-serif" }}>
                              {p.initial}
                            </span>
                          </div>
                        ) : (
                          <div className="w-16 h-16 rounded-lg flex items-center justify-center shrink-0" style={{ background: 'rgba(212,175,55,0.05)' }}>
                            <ImageOff className="w-4 h-4 text-amber-500/20" />
                          </div>
                        )}
                      </div>
                      <div className="p-2 pt-0">
                        <p className="text-sm font-semibold leading-snug line-clamp-2" style={{ color: 'rgba(255,255,255,0.85)' }}>{getProductDisplayName(p, language)}</p>
                        <p className="font-bold text-sm mt-1" style={{ color: '#d4af37' }}>{translate(langData, 'priceLabel', { amount: p.price.toLocaleString() })}</p>
                      </div>
                    </button>
                  ))}
                </div>
              </section>
            )}

            <div className="flex items-center justify-between mb-4">
              <h2 className="text-xs font-bold tracking-[0.3em] uppercase" style={{ color: 'rgba(212,175,55,0.5)' }}>
                {translate(langData, "productsFound", { count: filtered.length.toLocaleString(), plural: filtered.length !== 1 ? "s" : "" })}
              </h2>
            </div>

            {visibleProducts.length === 0 ? (
              <div className="text-center py-20">
                <ShoppingBag className="w-10 h-10 mx-auto mb-3" style={{ color: 'rgba(212,175,55,0.2)' }} />
                <p className="text-sm" style={{ color: 'rgba(255,255,255,0.35)' }}>{translate(langData, "noProducts")}</p>
              </div>
            ) : (
              <>
                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 sm:gap-4">
                  {visibleProducts.map((p) => (
                    <ProductCard key={p.id} product={p} langData={langData} language={language} />
                  ))}
                </div>

                {visibleCount < filtered.length && (
                  <div className="flex justify-center mt-8">
                    <button
                      onClick={() => setVisibleCount((c) => c + PAGE_SIZE)}
                      className="border font-bold px-10 py-3 rounded-xl text-sm tracking-widest uppercase transition-all shadow-lg"
                      style={{ background: 'rgba(9,9,13,0.9)', borderColor: 'rgba(212,175,55,0.35)', color: '#d4af37', boxShadow: '0 0 25px rgba(212,175,55,0.08)' }}
                      onMouseEnter={e => { e.currentTarget.style.borderColor='rgba(212,175,55,0.7)'; e.currentTarget.style.boxShadow='0 0 35px rgba(212,175,55,0.18)'; }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor='rgba(212,175,55,0.35)'; e.currentTarget.style.boxShadow='0 0 25px rgba(212,175,55,0.08)'; }}
                    >
                      {translate(langData, "loadMore")}
                    </button>
                  </div>
                )}
              </>
            )}
          </main>

              <footer className="border-t mt-10 py-8 text-center" style={{ borderColor: 'rgba(212,175,55,0.08)' }}>
                <p className="text-xs tracking-[0.3em] uppercase" style={{ color: 'rgba(212,175,55,0.3)' }}>{translate(langData, "footer")}</p>
              </footer>
            </>
          )}
        </div>
      );
    }

    function LockScreen({
      password,
      setPassword,
      passError,
      setPassError,
      setIsLocked,
      language,
      setLanguage,
      langData
    }) {
      const [showPass, setShowPass] = useState(false);

      function handleUnlock(e) {
        if (e) e.preventDefault();
        if (password === "sahil99") {
          try {
            localStorage.setItem("sahil_authorized", "true");
            sessionStorage.setItem("sahil_authorized", "true");
          } catch (e) {
            console.warn("Storage access restricted on this browser:", e);
          }
          setIsLocked(false);
          setPassError("");
        } else {
          setPassError(translate(langData, "incorrectPass"));
        }
      }

      return (
        <div className="flex flex-col items-center justify-center min-h-screen px-4 py-12 relative z-10">
          <div className="absolute top-4 right-4 flex items-center gap-2">
            <span className="text-[10px] font-semibold uppercase tracking-[0.2em] text-amber-500/60">
              {translate(langData, "languageLabel")}
            </span>
            <select
              value={language}
              onChange={(e) => {
                setLanguage(e.target.value);
                setPassError("");
              }}
              className="border rounded-xl px-2.5 py-1.5 text-xs font-medium bg-black/60 border-amber-500/20 text-white/80 focus:outline-none focus:border-amber-500/50"
            >
              <option value="en">English</option>
              <option value="ur">اردو</option>
            </select>
          </div>

          <div 
            className="w-full max-w-md backdrop-blur-xl rounded-3xl p-8 sm:p-10 border text-center transition-all duration-300 shadow-2xl"
            style={{ background: 'rgba(9,9,13,0.75)', borderColor: 'rgba(212,175,55,0.18)', boxShadow: '0 10px 50px rgba(0,0,0,0.8)' }}
          >
            <div className="relative flex items-center justify-center w-20 h-20 mx-auto mb-6">
              <div className="absolute inset-0 bg-gradient-to-tr from-amber-500 to-amber-700 opacity-20 rounded-2xl blur-md animate-pulse" />
              <div 
                className="relative rounded-2xl border p-4 flex items-center justify-center bg-[#09090d] transition-all"
                style={{ borderColor: 'rgba(212,175,55,0.45)' }}
              >
                <svg className="w-8 h-8 text-amber-400 animate-scale-pulse" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
              </div>
            </div>

            <h2 
              className="text-2xl sm:text-3xl font-black tracking-wider uppercase mb-2 bg-gradient-to-r from-amber-400 via-amber-200 to-amber-400"
              style={{ fontFamily: "'Poppins', sans-serif", WebkitBackgroundClip: 'text', backgroundClip: 'text', color: 'transparent' }}
            >
              {translate(langData, "appTitle")}
            </h2>
            <p className="text-xs text-white/50 tracking-wider max-w-xs mx-auto mb-8 leading-relaxed">
              {translate(langData, "lockSubtitle")}
            </p>

            <form onSubmit={handleUnlock} className="flex flex-col gap-4 text-left">
              <div className="relative">
                <input
                  type={showPass ? "text" : "password"}
                  value={password}
                  onChange={(e) => {
                    setPassword(e.target.value);
                    if (passError) setPassError("");
                  }}
                  placeholder={translate(langData, "enterPassword")}
                  className="w-full border rounded-xl pl-4 pr-12 py-3.5 text-sm transition-all focus:outline-none"
                  style={{
                    background: 'rgba(5,5,8,0.9)',
                    borderColor: passError ? 'rgba(239,68,68,0.5)' : 'rgba(212,175,55,0.18)',
                    color: 'rgba(255,255,255,0.9)',
                    caretColor: '#d4af37'
                  }}
                  onFocus={e => {
                    if (!passError) {
                      e.target.style.borderColor='rgba(212,175,55,0.5)';
                      e.target.style.boxShadow='0 0 0 3px rgba(212,175,55,0.08)';
                    }
                  }}
                  onBlur={e => {
                    if (!passError) {
                      e.target.style.borderColor='rgba(212,175,55,0.18)';
                      e.target.style.boxShadow='none';
                    }
                  }}
                />
                
                <button
                  type="button"
                  onClick={() => setShowPass(!showPass)}
                  className="absolute right-3.5 top-1/2 -translate-y-1/2 text-white/40 hover:text-amber-400 transition-colors"
                >
                  {showPass ? (
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                      <path strokeLinecap="round" strokeLinejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"></path>
                    </svg>
                  ) : (
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                      <path strokeLinecap="round" strokeLinejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"></path>
                      <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                  )}
                </button>
              </div>

              {passError && (
                <p className="text-red-500 text-xs font-semibold pl-1 animate-pulse">
                  {passError}
                </p>
              )}

              <button
                type="submit"
                className="w-full mt-2 font-bold py-3.5 rounded-xl text-sm tracking-wider uppercase transition-all shadow-lg text-center"
                style={{
                  background: 'linear-gradient(135deg, #d4af37 0%, #b49017 100%)',
                  color: '#020205',
                  boxShadow: '0 4px 20px rgba(212,175,55,0.25)'
                }}
                onMouseEnter={e => {
                  e.currentTarget.style.filter='brightness(1.1)';
                  e.currentTarget.style.boxShadow='0 6px 25px rgba(212,175,55,0.4)';
                }}
                onMouseLeave={e => {
                  e.currentTarget.style.filter='none';
                  e.currentTarget.style.boxShadow='0 4px 20px rgba(212,175,55,0.25)';
                }}
              >
                {translate(langData, "unlockLabel")}
              </button>
            </form>
          </div>
        </div>
      );
    }

    function CategoryDropdown({ activeCategory, setActiveCategory, setCatMenuOpen, fullWidth, langData }) {
      return (
        <div
          className={`absolute mt-2 ${fullWidth ? "w-full" : "w-64 right-0"} backdrop-blur-xl rounded-xl shadow-2xl overflow-hidden z-40 max-h-80 overflow-y-auto border`}
          style={{ background: 'rgba(9,9,13,0.97)', borderColor: 'rgba(212,175,55,0.18)' }}
        >
          <button
            onClick={() => {
              setActiveCategory("all");
              setCatMenuOpen(false);
            }}
            className="w-full text-left px-4 py-2.5 text-sm font-semibold border-b transition-colors"
            style={{
              borderColor: 'rgba(212,175,55,0.08)',
              color: activeCategory === "all" ? '#d4af37' : 'rgba(255,255,255,0.75)',
              background: activeCategory === "all" ? 'rgba(212,175,55,0.06)' : 'transparent'
            }}
            onMouseEnter={e => { if (activeCategory !== 'all') e.currentTarget.style.background='rgba(212,175,55,0.04)'; }}
            onMouseLeave={e => { if (activeCategory !== 'all') e.currentTarget.style.background='transparent'; }}
          >
            {translate(langData, "allCategories")}
          </button>
          {CATEGORIES.map((c) => (
            <button
              key={c.id}
              onClick={() => {
                setActiveCategory(c.id);
                setCatMenuOpen(false);
              }}
              className="w-full text-left px-4 py-2.5 text-sm border-b last:border-0 transition-colors"
              style={{
                borderColor: 'rgba(212,175,55,0.06)',
                color: activeCategory === c.id ? '#d4af37' : 'rgba(255,255,255,0.75)',
                background: activeCategory === c.id ? 'rgba(212,175,55,0.06)' : 'transparent',
                fontWeight: activeCategory === c.id ? '600' : '400'
              }}
              onMouseEnter={e => { if (activeCategory !== c.id) e.currentTarget.style.background='rgba(212,175,55,0.04)'; }}
              onMouseLeave={e => { if (activeCategory !== c.id) e.currentTarget.style.background='transparent'; }}
            >
              {langData.categories?.[c.id] || c.name}
            </button>
          ))}
        </div>
      );
    }

    function ProductCard({ product, langData, language }) {
      return (
        <div
          className="rounded-2xl overflow-hidden flex flex-col transition-all duration-300 group cursor-default"
          style={{ background: 'rgba(9,9,13,0.92)', border: '1px solid rgba(212,175,55,0.1)', boxShadow: '0 4px 30px rgba(0,0,0,0.5)' }}
          onMouseEnter={e => { e.currentTarget.style.borderColor='rgba(212,175,55,0.4)'; e.currentTarget.style.boxShadow='0 8px 40px rgba(212,175,55,0.08), 0 4px 30px rgba(0,0,0,0.6)'; e.currentTarget.style.transform='translateY(-2px)'; }}
          onMouseLeave={e => { e.currentTarget.style.borderColor='rgba(212,175,55,0.1)'; e.currentTarget.style.boxShadow='0 4px 30px rgba(0,0,0,0.5)'; e.currentTarget.style.transform='translateY(0)'; }}
        >
          {/* Product Image / Initial */}
          <div className="h-32 sm:h-36 w-full flex items-center justify-center p-3" style={{ background: 'rgba(212,175,55,0.03)' }}>
            {product.hasImage ? (
              <div className={`w-24 h-24 sm:w-28 sm:h-28 rounded-xl bg-gradient-to-br ${product.gradient} flex items-center justify-center shrink-0 shadow-lg`}>
                <span className="text-white text-3xl sm:text-4xl font-bold" style={{ fontFamily: "'Poppins', sans-serif" }}>
                  {product.initial}
                </span>
              </div>
            ) : (
              <div className="w-24 h-24 sm:w-28 sm:h-28 rounded-xl flex flex-col items-center justify-center gap-0.5 shrink-0" style={{ background: 'rgba(212,175,55,0.04)' }}>
                <ImageOff className="w-7 h-7 sm:w-8 sm:h-8" style={{ color: 'rgba(212,175,55,0.2)' }} />
                <span className="text-[9px] font-medium" style={{ color: 'rgba(212,175,55,0.3)' }}>{translate(langData, "noPhoto")}</span>
              </div>
            )}
          </div>
          {/* Thin gold divider */}
          <div className="h-px mx-3" style={{ background: 'rgba(212,175,55,0.08)' }} />
          <div className="p-3 pt-2 flex flex-col gap-1 flex-1">
            <p className="text-sm sm:text-base font-semibold leading-snug line-clamp-2" style={{ color: 'rgba(255,255,255,0.88)' }}>{getProductDisplayName(product, language)}</p>
            <p className="font-black text-base sm:text-lg mt-auto" style={{ color: '#d4af37' }}>{translate(langData, 'priceLabel', { amount: product.price.toLocaleString() })}</p>
          </div>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<SahilTraders />);
  </script>
</body>
</html>
